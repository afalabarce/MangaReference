name: Maintenance Task
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 * * * *'  # Run every hour

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Maintenance Script
        run: |
          pip install requests
          python scripts/maintenance.py
